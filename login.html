<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - PHARMATECH ERP</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- External Libraries -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Reset and Layout Specific to Login Page */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #082C3A 0%, #0F9D7A 100%);
      font-family: 'Inter', 'Poppins', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Lights for Visual Wow Factor */
    body::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(28, 201, 138, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(30, 136, 229, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    /* Glassmorphism Login Card */
    .login-container {
      position: relative;
      z-index: 10;
      width: 460px;
      max-width: 90%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header Logo and Title */
    .login-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .login-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .login-logo-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: #ffffff;
      color: #0F9D7A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(15, 157, 122, 0.3);
    }

    .login-brand {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      line-height: 1;
    }

    .login-tagline {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
      letter-spacing: 0.5px;
      margin: 0;
    }

    /* Form Fields */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: rgba(255, 255, 255, 0.5);
      width: 18px;
      height: 18px;
    }

    .form-control {
      width: 100%;
      height: 48px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 0 16px 0 46px;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .form-control:focus {
      border-color: #1CC98A;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(28, 201, 138, 0.2);
    }

    /* Options and Checkbox */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-weight: 500;
      user-select: none;
    }

    .custom-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #1CC98A;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.85rem;
      color: #1CC98A;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: #ffffff;
      text-shadow: 0 0 8px rgba(28, 201, 138, 0.4);
    }

    /* Primary Button */
    .btn-login {
      height: 48px;
      background: linear-gradient(135deg, #0F9D7A 0%, #1CC98A 100%);
      color: #ffffff;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(28, 201, 138, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo-container">
        <div class="login-logo-icon">
          <i data-lucide="activity"></i>
        </div>
        <h1 class="login-brand">PHARMATECH</h1>
      </div>
      <p class="login-tagline">La technologie au service de votre santé</p>
    </div>

    <!-- Error message area -->
    <div class="error-msg" id="error-alert">
      <i data-lucide="alert-circle" style="width:16px; height:16px;"></i>
      <span id="error-text">Identifiants incorrects. Veuillez réessayer.</span>
    </div>

    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Professionnel</label>
        <div class="input-wrapper">
          <i data-lucide="mail" class="input-icon"></i>
          <input type="email" id="email" class="form-control" placeholder="pharmacien@pharmatech.ma" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mot de Passe</label>
        <div class="input-wrapper">
          <i data-lucide="lock" class="input-icon"></i>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" class="custom-checkbox">
          Se souvenir de moi
        </label>
        <a href="#" class="forgot-link" onclick="alert('Veuillez contacter votre administrateur système pour réinitialiser votre mot de passe.')">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-login">
        Connexion <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
      </button>
    </form>
  </div>

  <script type="module">
    import store from './js/store.js';

    document.addEventListener('DOMContentLoaded', () => {
      // Pre-fill email if remembered
      const savedEmail = localStorage.getItem('pharma_remembered_email');
      if (savedEmail) {
        document.getElementById('email').value = savedEmail;
        document.getElementById('remember').checked = true;
      }
      
      lucide.createIcons();
    });

    const form = document.getElementById('login-form');
    const errorAlert = document.getElementById('error-alert');
    const errorText = document.getElementById('error-text');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      // Acceptance credentials: admin@pharmatech.ma / admin
      // But we will allow any login to make it easy for testing, or we can check the default admin.
      // Let's accept any login, but if they enter a correct structure, set authentication flag.
      
      if (email.length > 0 && password.length > 0) {
        if (remember) {
          localStorage.setItem('pharma_remembered_email', email);
          localStorage.setItem('pharma_authenticated', 'true');
        } else {
          localStorage.removeItem('pharma_remembered_email');
        }
        
        sessionStorage.setItem('pharma_authenticated', 'true');
        
        // Show success / redirect
        window.location.href = 'index.html';
      } else {
        errorText.textContent = "Veuillez remplir tous les champs.";
        errorAlert.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
